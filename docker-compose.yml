services:
  pi-sandbox:
    build: .
    stdin_open: true
    tty: true
    volumes:
      # Hot-reload: mount src/ over the copied source
      - ./src:/root/pi-open-agents/src
      # Auth + models from host (read-only)
      # Override with: PI_AGENT_DIR=/path/to/.pi/agent docker compose run ...
      - ${PI_AGENT_DIR:-${HOME}/.pi/agent}/auth.json:/root/.pi/agent/auth.json:ro
      - ${PI_AGENT_DIR:-${HOME}/.pi/agent}/models.json:/root/.pi/agent/models.json:ro
      # Test workspace (project agents, OC agents, shared agents)
      - ./docker/test-workspace:/workspace
    working_dir: /workspace
